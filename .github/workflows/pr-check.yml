name: PR Check

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.3.11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: |
          pnpm exec turbo run test \
            --filter=@nestjs-ai/advisors-vector-store \
            --filter=@nestjs-ai/client-chat \
            --filter=@nestjs-ai/commons \
            --filter=@nestjs-ai/document-reader-cheerio \
            --filter=@nestjs-ai/document-reader-markdown \
            --filter=@nestjs-ai/document-reader-pdf \
            --filter=@nestjs-ai/mcp-common \
            --filter=@nestjs-ai/model \
            --filter=@nestjs-ai/model-anthropic \
            --filter=@nestjs-ai/model-chat-memory-repository-jsdbc \
            --filter=@nestjs-ai/model-google-genai \
            --filter=@nestjs-ai/model-openai \
            --filter=@nestjs-ai/model-transformers \
            --filter=@nestjs-ai/platform \
            --filter=@nestjs-ai/rag \
            --filter=@nestjs-ai/retry \
            --filter=@nestjs-ai/template-st \
            --filter=@nestjs-ai/vector-store

      - name: Run container-backed tests
        run: |
          pnpm exec turbo run test \
            --filter=@nestjs-ai/document-reader-tika \
            --filter=@nestjs-ai/integration-tests \
            --filter=@nestjs-ai/model-chat-memory-repository-redis \
            --filter=@nestjs-ai/vector-store-redis \
            --concurrency=1
