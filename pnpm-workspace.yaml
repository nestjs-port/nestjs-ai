packages:
  - 'packages/*'
  - 'packages/mcp/*'
  - 'packages/vector-stores/*'
  - 'packages/memory/repository/*'
  - 'packages/models/*'
  - 'packages/advisors/*'
  - 'packages/document-readers/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  cpu-features: true
  esbuild: true
  oracledb: true
  prisma: true
  protobufjs: true
  sharp: true
  sqlite3: true
  ssh2: true
